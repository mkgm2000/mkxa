<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>App Icon · Sunflower</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 20% -10%, #f6f8fa, transparent 60%),
      radial-gradient(1000px 700px at 110% 110%, #e6ecef, transparent 60%),
      #eef2f4;
    color: #1b1d1f;
    min-height: 100vh;
    padding: 64px 40px 96px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    text-align: center;
    margin-bottom: 56px;
  }
  header h1 {
    font-size: 36px;
    font-weight: 800;
    margin: 0 0 8px;
    letter-spacing: -0.025em;
  }
  header p {
    margin: 0;
    color: #6b7178;
    font-size: 16px;
  }

  .hero {
    display: flex;
    align-items: flex-end;
    gap: 56px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* hidden defs holder */
  .defs { position: absolute; width: 0; height: 0; }

  /* ---- The icon ---- */
  .icon {
    width: 280px;
    height: 280px;
    position: relative;
    border-radius: 64px;
    overflow: hidden;
    background: linear-gradient(160deg, #bfe6ff 0%, #87c9ff 48%, #6aa8ff 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 30px 60px -24px rgba(40,80,160,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 70% at 50% -10%, rgba(255,255,255,0.55), transparent 55%),
      radial-gradient(120% 80% at 50% 120%, rgba(20,50,120,0.22), transparent 60%);
    pointer-events: none;
  }
  .icon svg {
    width: 84%;
    height: 84%;
    overflow: visible;
    position: relative;
    z-index: 1;
    animation: bob 3.6s ease-in-out infinite;
    transform-origin: 50% 50%;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%     { transform: translateY(-7px) rotate(2deg); }
  }

  /* size previews */
  .sizes { display: flex; align-items: flex-end; gap: 28px; }
  .sizes .lab { text-align: center; color: #8d949c; font-size: 12px; font-weight: 500; }
  .mini {
    border-radius: 28%;
    overflow: hidden;
    background: linear-gradient(160deg, #bfe6ff 0%, #87c9ff 48%, #6aa8ff 100%);
    box-shadow: 0 8px 20px -8px rgba(40,80,160,0.5), 0 1px 0 rgba(255,255,255,0.6) inset;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 8px;
  }
  .mini svg { width: 84%; height: 84%; overflow: visible; }
  .s120 { width: 120px; height: 120px; border-radius: 27px; }
  .s76  { width: 76px;  height: 76px;  border-radius: 17px; }
  .s48  { width: 48px;  height: 48px;  border-radius: 11px; }
</style>
</head>
<body>

<header>
  <h1>App Icon · Sunflower</h1>
  <p>Girasol "chubby" — solo la flor, centrada en un squircle estilo iOS.</p>
</header>

<!-- Master flower definition, reused everywhere via <use> -->
<svg class="defs" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <radialGradient id="petalG" cx="50%" cy="35%" r="75%">
      <stop offset="0%"  stop-color="#ffe169"/>
      <stop offset="55%" stop-color="#ffc02e"/>
      <stop offset="100%" stop-color="#f59300"/>
    </radialGradient>
    <radialGradient id="centerG" cx="42%" cy="34%" r="75%">
      <stop offset="0%"  stop-color="#8a5a2b"/>
      <stop offset="55%" stop-color="#6b3f17"/>
      <stop offset="100%" stop-color="#4d2c0d"/>
    </radialGradient>
    <radialGradient id="centerHi" cx="40%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#c98a44" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#c98a44" stop-opacity="0"/>
    </radialGradient>

    <g id="flower">
      <!-- 12 chubby rounded petals around center (100,100) -->
      <g>
        <ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/>
        <g transform="rotate(30 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
        <g transform="rotate(60 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
        <g transform="rotate(90 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
        <g transform="rotate(120 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
        <g transform="rotate(150 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
        <g transform="rotate(180 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
        <g transform="rotate(210 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
        <g transform="rotate(240 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
        <g transform="rotate(270 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
        <g transform="rotate(300 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
        <g transform="rotate(330 100 100)"><ellipse cx="100" cy="50" rx="16" ry="26" fill="url(#petalG)"/></g>
      </g>

      <!-- center disk -->
      <circle cx="100" cy="100" r="42" fill="url(#centerG)"/>
      <ellipse cx="90" cy="88" rx="25" ry="21" fill="url(#centerHi)"/>
      <!-- seed dots -->
      <g fill="#3a2109" opacity="0.55">
        <circle cx="100" cy="100" r="2.4"/>
        <circle cx="111" cy="98" r="2.4"/><circle cx="89" cy="98" r="2.4"/>
        <circle cx="105" cy="109" r="2.4"/><circle cx="95" cy="109" r="2.4"/>
        <circle cx="116" cy="107" r="2.4"/><circle cx="84" cy="107" r="2.4"/>
        <circle cx="100" cy="88" r="2.4"/>
        <circle cx="110" cy="87" r="2.2"/><circle cx="90" cy="87" r="2.2"/>
        <circle cx="100" cy="114" r="2.2"/>
        <circle cx="119" cy="97" r="2"/><circle cx="81" cy="97" r="2"/>
      </g>

      <!-- cute face -->
      <ellipse cx="88"  cy="98" rx="4.4" ry="5.4" fill="#1b1208"/>
      <ellipse cx="89.4" cy="96" rx="1.4" ry="1.7" fill="#fff" opacity="0.9"/>
      <ellipse cx="112" cy="98" rx="4.4" ry="5.4" fill="#1b1208"/>
      <ellipse cx="113.4" cy="96" rx="1.4" ry="1.7" fill="#fff" opacity="0.9"/>
      <path d="M91 110 Q 100 119, 109 110" fill="none" stroke="#1b1208" stroke-width="3.4" stroke-linecap="round"/>
      <ellipse cx="80" cy="107" rx="5" ry="3" fill="#ff8a5c" opacity="0.45"/>
      <ellipse cx="120" cy="107" rx="5" ry="3" fill="#ff8a5c" opacity="0.45"/>
    </g>
  </defs>
</svg>

<div class="hero">
  <div class="icon">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><use href="#flower"/></svg>
  </div>

  <div class="sizes">
    <div class="lab">
      <div class="mini s120"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><use href="#flower"/></svg></div>
      120px
    </div>
    <div class="lab">
      <div class="mini s76"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><use href="#flower"/></svg></div>
      76px
    </div>
    <div class="lab">
      <div class="mini s48"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><use href="#flower"/></svg></div>
      48px
    </div>
  </div>
</div>

</body>
</html>
